<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Ping - Bark 推送</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary: #007aff;
      --primary-hover: #005bb5;
      --success: #34c759;
      --error: #ff3b30;
      --text: #1a1a1a;
      --background-light: #f0f0f0;
      --background-medium: #e0e0e0;
      --background-dark: #d1d1d1;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, var(--background-light), var(--background-medium), var(--background-dark));
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      transition: opacity 0.5s;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2.5rem 3rem;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .container:hover {
      transform: translateY(-10px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
    }

    button {
      position: relative;
      overflow: hidden;
      padding: 1.5rem 3rem;
      font-size: 1.2rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
      box-shadow: 0 8px 16px rgba(0, 122, 255, 0.2);
    }

    button:hover {
      background: var(--primary-hover);
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
    }

    button:active {
      transform: scale(0.95);
    }

    /* 按钮涟漪效果 */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      transform: scale(0);
      animation: rippleEffect 600ms linear;
      pointer-events: none;
    }

    @keyframes rippleEffect {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    button.loading::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      top: 50%;
      left: 50%;
      margin: -10px 0 0 -10px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      padding: 1rem 2rem;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 1000;
      background: var(--success);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .toast.success { background: var(--success); }
    .toast.error { background: var(--error); }

    .floating-dots {
      position: fixed;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: -1;
    }

    .dot {
      position: absolute;
      background: rgba(0, 122, 255, 0.1);
      border-radius: 50%;
      animation: float 25s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-30vh) translateX(15vw); }
      50% { transform: translateY(10vh) translateX(-10vw); }
      75% { transform: translateY(-15vh) translateX(20vw); }
      100% { transform: translateY(0) translateX(0); }
    }

    /* 纸屑动态效果 */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0.8;
      animation: confetti-fall 3s linear forwards;
    }

    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="floating-dots" id="dotsContainer"></div>
  
  <div class="container">
    <input type="text" id="barkKeyInput" placeholder="请输入 Bark Key" style="margin-bottom: 1rem; padding: 1rem; width: 100%; border-radius: 8px; border: 1px solid #ccc;">
    <input type="text" id="bodyTextInput" placeholder="请输入推送内容" style="margin-bottom: 1rem; padding: 1rem; width: 100%; border-radius: 8px; border: 1px solid #ccc;">
    <button id="pingBtn">Ping 🚀</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // 动态生成背景圆点
    function createFloatingDots() {
      const container = document.getElementById('dotsContainer');
      for (let i = 0; i < 25; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        const size = Math.random() * 30 + 10;
        dot.style.width = dot.style.height = `${size}px`;
        dot.style.left = `${Math.random() * 100}%`;
        dot.style.top = `${Math.random() * 100}%`;
        dot.style.animationDelay = `${Math.random() * 20}s`;
        container.appendChild(dot);
      }
    }

    // Toast 提示函数
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // 纸屑随机颜色函数
    function randomColor() {
      const colors = ['#FFC107', '#FF5722', '#8BC34A', '#00BCD4', '#9C27B0'];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    // 纸屑动画效果函数
    function showConfetti() {
      const confettiContainer = document.createElement('div');
      confettiContainer.className = 'confetti-container';
      for (let i = 0; i < 40; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = `${Math.random() * 100}vw`;
        confetti.style.backgroundColor = randomColor();
        confetti.style.animationDelay = `${Math.random() * 0.5}s`;
        confettiContainer.appendChild(confetti);
      }
      document.body.appendChild(confettiContainer);
      setTimeout(() => confettiContainer.remove(), 3000);
    }

    // 推送逻辑（添加涟漪、纸屑效果和更美观的动画反馈）
    // 删除原有的常量定义
    // const barkKey = "A35Y2ZJs2dJEUZdwAxvfRE";
    // const bodyText = "快点行动！";
    const title = "ping";
    const sound = "default";
    const level = 1;

    document.getElementById("pingBtn").addEventListener("click", async function(e) {
      const btn = this;
      const barkKey = document.getElementById('barkKeyInput').value;
      const bodyText = document.getElementById('bodyTextInput').value;
      
      if (!barkKey || !bodyText) {
        showToast("请先填写 Bark Key 和推送内容", 'error');
        return;
      }
      
      // 添加按钮涟漪效果
      const rect = btn.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.left = `${e.clientX - rect.left}px`;
      ripple.style.top = `${e.clientY - rect.top}px`;
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);

      btn.classList.add('loading');
      btn.disabled = true;
      
      try {
        const url = `https://api.day.app/${barkKey}/${encodeURIComponent(title)}/${encodeURIComponent(bodyText)}?sound=${sound}&level=${level}`;
        const response = await fetch(url);
        const data = await response.json();

        if (data.code === 200) {
          showToast("✓ Ping 成功！", 'success');
          showConfetti();
          btn.style.transform = 'scale(0.95)';
          setTimeout(() => btn.style.transform = '', 100);
        } else {
          showToast(`✗ 失败：${data.message}`, 'error');
        }
      } catch (error) {
        console.error("请求错误：", error);
        showToast("⚠ 请求出错，请查看控制台", 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });

    // 初始化动画效果
    createFloatingDots();
    // 页面加载动画
    document.body.style.opacity = 0;
    setTimeout(() => document.body.style.opacity = 1, 100);
  </script>
</body>
</html>
